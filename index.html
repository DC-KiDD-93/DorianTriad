<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#090909">
  <meta name="description" content="Dorian Triad — Personal Health & Performance App">
  <title>Dorian Triad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app">

    <!-- Top bar -->
    <header id="topbar">
      <div id="topbar-left">
        <button id="back-btn" class="icon-btn hidden" onclick="App.back()" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
      <div id="topbar-title">DORIAN TRIAD</div>
      <div id="topbar-right">
        <button class="icon-btn" onclick="App.goTab('log')" aria-label="Log" title="Workout Log">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        </button>
      </div>
    </header>

    <!-- Scrollable content -->
    <main id="content" role="main"></main>

    <!-- Bottom navigation -->
    <nav id="bottom-nav" aria-label="Main navigation">
      <button class="nav-tab active" data-tab="home" onclick="App.goTab('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-tab" data-tab="workout" onclick="App.goTab('workout')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 4h2v16H6zM16 4h2v16h-2z"/><line x1="3" y1="9" x2="6" y2="9"/><line x1="18" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="6" y2="15"/><line x1="18" y1="15" x2="21" y2="15"/></svg>
        <span>Workout</span>
      </button>
      <button class="nav-tab" data-tab="log" onclick="App.goTab('log')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Log</span>
      </button>
      <button class="nav-tab" data-tab="guide" onclick="App.goTab('guide')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        <span>Guide</span>
      </button>
      <button class="nav-tab" data-tab="stats" onclick="App.goTab('stats')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Stats</span>
      </button>
    </nav>

    <!-- Workout overlay (filled by JS) -->
    <div id="workout-overlay" class="workout-overlay hidden" role="dialog" aria-modal="true" aria-label="Workout session"></div>

    <!-- Rest timer float (always present) -->
    <div id="rest-panel" class="rest-panel" role="timer" aria-live="polite">
      <div class="rest-top">
        <div id="rest-label" class="rest-label">Rest</div>
        <button class="rest-skip-x" onclick="App.restDismiss()" aria-label="Skip rest">✕</button>
      </div>
      <div id="rest-count" class="rest-count">1:30</div>
      <div class="rest-track"><div id="rest-fill" class="rest-fill"></div></div>
      <div class="rest-actions">
        <button onclick="App.restAdd(30)">+30s</button>
        <button onclick="App.restDismiss()">Skip</button>
      </div>
    </div>

  </div><!-- #app -->
  <script src="app.js"></script>
</body>
</html>
